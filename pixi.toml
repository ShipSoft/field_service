[workspace]
name = "field_service"
description = "SHiP magnetic field service (framework-agnostic, covfie-backed)"
channels = ["https://prefix.dev/ship", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Required by CovfieFieldSource (find_package mp-units CONFIG REQUIRED).
mp-units = "*"

# Required by the default BUILD_G4_ADAPTER=ON path.
geant4 = ">=11.3"

# Required by tools/fairship_to_cvf (only built when ROOT is detected).
root = ">=6.36"

# Build toolchain.
cmake = ">=3.28"
ninja = "*"
cxx-compiler = "*"

# covfie + GoogleTest are fetched at configure time via FetchContent.
git = "*"

[activation]
scripts = ["activate.sh"]

[tasks]
configure = { cmd = """
cmake -S . -B build -G Ninja \
    -DCMAKE_BUILD_TYPE=RelWithDebInfo \
    -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
""" }
build = { cmd = "cmake --build build -j", depends-on = ["configure"] }
install = { cmd = "cmake --install build", depends-on = ["build"] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = ["build"] }
clean = "rm -rf build"

# Linting / formatting toolchain. prek orchestrates the hooks; the tools come
# from this environment so versions are tracked in pixi.lock and run identically
# everywhere (including NixOS). See .pre-commit-config.yaml.
[feature.lint.dependencies]
prek = "*"
python = ">=3.11"
clang-format = "22.*"
codespell = "*"
reuse = "*"
cffconvert = "*"
commitizen = "*"

# Pinned via PyPI to match the previous hook revs exactly: conda-forge's cpplint
# is stuck at 1.6.0 (a different, stale fork), and its gersemi (0.24.0) lags the
# repo's 0.27.7 and would reflow CMake files.
[feature.lint.pypi-dependencies]
cpplint = "==2.0.2"
gersemi = "==0.27.7"

[feature.lint.tasks]
lint = "prek run --all-files"
# Install the git hooks and route them through `pixi run` so the conda-provided
# hook tools are on PATH at commit time (required on NixOS, where the tools are
# not runnable without pixi activation).
install-hooks = '''
prek install --hook-type pre-commit --hook-type commit-msg
hooks=$(git rev-parse --git-path hooks)
for h in pre-commit commit-msg; do
  sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/$h"
done
'''

[environments]
default = { solve-group = "default" }
lint = { features = ["lint"], solve-group = "lint" }
